<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pig-Dice Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous"></head>
<body>
    <div class="wrapper clearfix">
        <div class="player-1-panel active">
            <div class="player-name" id="player-1">Player 1</div>
            <div class="player-score" id="socre-1">25</div>
            <div class="player-current-box">
                <div class="player-current-label">Current</div>
                <div class="player-current-score" id="current-1">1</div>
            </div>
        </div>

        <div class="player-2-panel">
            <div class="player-name" id="player-2">Player 2</div>
            <div class="player-score" id="socre-2">35</div>
            <div class="player-current-box">
                <div class="player-current-label">Current</div>
                <div class="player-current-score" id="current-2">3</div>
            </div>
        </div>
        <button class="btn-new"><i class="fa fa-plus-circle fa-2x"></i>New Game</button>
        <button class="btn-roll"><i class="fa fa-retweet fa-2x"></i>Roll Dice</button>
        <button class="btn-hold"><i class="fa fa-pause-circle fa-2x"></i>Hold</button>

        <img src="dice-05.jpg" alt="Dice" class="dice">
    </div>
    <script src="app.js"></script>
</body>
</html>
